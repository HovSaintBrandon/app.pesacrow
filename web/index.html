  <!-- ===================== LOADING SCREEN STYLES ===================== -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #0A0A0A;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #splash-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0A0A0A 0%, #111D15 100%);
      z-index: 9999;
      transition: opacity 0.4s ease-out;
    }

    #splash-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splash-logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin-bottom: 20px;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .splash-title {
      color: #2E9D5B;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin: 0 0 8px;
    }

    .splash-tagline {
      color: rgba(255, 255, 255, 0.45);
      font-size: 13px;
      margin: 0;
    }

    .splash-loader {
      margin-top: 40px;
      width: 40px;
      height: 4px;
      background: rgba(46, 157, 91, 0.2);
      border-radius: 2px;
      overflow: hidden;
    }

    .splash-loader-bar {
      height: 100%;
      width: 40%;
      background: #2E9D5B;
      border-radius: 2px;
      animation: loading 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: 0.85; }
    }

    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>

  <script>
    // Dismiss splash screen once Flutter signals it is ready
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash-screen');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(function () { splash.remove(); }, 450);
      }
    });
  </script>
