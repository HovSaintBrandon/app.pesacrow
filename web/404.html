<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PesaCrow</title>
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // MIT License
    // https://github.com/rafgraph/spa-github-pages
    // This script checks to see if a redirect is present in the query string,
    // converts it back into a correct url and adds it to the
    // browser's history using window.history.replaceState(...),
    // which causes the browser to load the new url without restarting
    // the app which is a SPA.
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
</head>
<body>
  <!-- This is a duplicate of index.html designed to catch 404s on GitHub Pages -->
  <!-- and redirect them to the index.html with the correct path. -->
  <script type="text/javascript">
    // If the above script didn't handle it, we do a hard redirect to index.html with the path in query
    var path = window.location.pathname;
    window.location.replace('/?/' + path.split('/').filter(Boolean).join('/') + window.location.search + window.location.hash);
  </script>
</body>
</html>
